[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
testmap = { workspace = true }

[dependency-groups]
dev = [
    "pyrefly>=1.1.1",
    "pytest>=9.1.1",
    "pytest-cov>=7.0.0",
    "ruff>=0.15.20",
]

# testmap's own configuration: the test-kind taxonomy and which kinds each
# feature must have. `required` is the global default; per-feature entries override it.
[tool.testmap]
kinds = ["unit", "integration", "property", "perf"]
required = ["unit", "integration"]

# Symbols shown in the Status column. Both default (✓ / ✗) if this table is
# omitted; override either independently.
[tool.testmap.statuses]
complete = "✓"
incomplete = "✗"

# A feature entry is either a list of required kinds, or a table with `exclude`
# to drop kinds a feature doesn't need (shown as n/a, never counted as missing).
[tool.testmap.features]
processor = ["unit", "integration", "property"]
docs = { exclude = ["perf"] }

[tool.pytest.ini_options]
testpaths = ["packages"]

[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pyrefly]
search-path = ["packages/testmap/src", "packages/pytest-testmap/src"]
