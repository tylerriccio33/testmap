name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # Maintains a release PR per package off main. Merging a release PR bumps that
  # package's version in its pyproject.toml, updates its CHANGELOG.md, tags
  # <package>-vX.Y.Z, and publishes a GitHub Release.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # A matrix `include` array — one entry per package that released this run,
      # each carrying the uv package name and its dedicated GitHub environment.
      # Empty `include` when no release PR was merged, which skips `publish`.
      matrix: ${{ steps.matrix.outputs.matrix }}
      any_released: ${{ steps.matrix.outputs.any }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Turn paths_released (e.g. ["packages/testmap"]) into publish-matrix entries.
      # Each package gets its own environment `pypi-<name>` so their PyPI trusted
      # publishers have distinct configs (PyPI requires pending publishers to be
      # unique on repo + workflow + environment).
      - name: Build publish matrix
        id: matrix
        env:
          PATHS: ${{ steps.release.outputs.paths_released }}
        run: |
          include=$(echo "${PATHS:-[]}" | jq -c '[.[] | (. | sub(".*/"; "")) as $n | {name: $n, environment: ("pypi-" + $n)}]')
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"
          [ "$(echo "$include" | jq 'length')" -gt 0 ] && echo "any=true" >> "$GITHUB_OUTPUT" || echo "any=false" >> "$GITHUB_OUTPUT"

  # Fan out over exactly the packages that just released. Because both packages
  # are pure Python, each build is a simple `uv build` producing an sdist + a
  # universal wheel — no per-platform wheel matrix needed.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.any_released == 'true' }}
    runs-on: ubuntu-latest
    # Trusted Publishing lives in this top-level workflow (not a reusable one):
    # OIDC fails with `invalid-publisher` from inside a `workflow_call` workflow.
    # Configure each PyPI project's trusted publisher with workflow file
    # `release-please.yml` and environment `pypi-<package-name>`.
    environment: ${{ matrix.environment }}
    permissions:
      id-token: write # OIDC Trusted Publishing
      contents: read
      attestations: write # build provenance
    strategy:
      fail-fast: false
      # publish the workspace-internal dependency (testmap) before its dependents.
      max-parallel: 1
      matrix: ${{ fromJSON(needs.release-please.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build --package "${{ matrix.name }}" --out-dir dist

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
